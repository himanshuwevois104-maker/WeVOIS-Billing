# WeVois Billing — Render.com Deployment Config
services:
  - type: web
    name: wevois-billing
    runtime: node
    region: singapore  # closest to India
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22.5.0
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
    healthCheckPath: /api/auth/me
